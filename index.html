<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="rayjfoo">
<link rel="manifest" href="manifest.json">
<title>rayjfoo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ====== 导航栏 ====== -->
<header id="header">
  <div id="header-left"></div>
  <h1 id="header-title">总览</h1>
  <div id="header-right">
    <button id="header-btn-right" class="header-btn" style="display:none"></button>
  </div>
</header>

<!-- ====== 主内容区 ====== -->
<main id="content">

<!-- 总览 -->
<section id="page-dashboard" class="page active">
  <div class="page-content">
    <div class="card">
      <div class="month-nav">
        <button class="month-btn" onclick="navMonth(-1)">‹</button>
        <span id="dash-month" class="month-label"></span>
        <button class="month-btn" onclick="navMonth(1)">›</button>
      </div>
      <div class="summary-row">
        <div class="summary-item">
          <span class="summary-label">支出</span>
          <span class="summary-value red" id="dash-expense">¥0</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-item">
          <span class="summary-label">收入</span>
          <span class="summary-value green" id="dash-income">¥0</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-item">
          <span class="summary-label">结余</span>
          <span class="summary-value" id="dash-balance">¥0</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon-bolt"></span> 快速记账</div>
      <div class="quick-grid" id="quick-grid"></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon-check"></span> 今日打卡</div>
      <div id="dash-habits"></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon-clock"></span> 最近记录</div>
      <div id="dash-recent"></div>
    </div>
  </div>
</section>

<!-- 记账 -->
<section id="page-expenses" class="page">
  <div class="page-content">
    <div class="month-nav">
      <button class="month-btn" onclick="expNavMonth(-1)">‹</button>
      <span id="exp-month" class="month-label"></span>
      <button class="month-btn" onclick="expNavMonth(1)">›</button>
      <div style="flex:1"></div>
      <button class="btn-icon" onclick="openAddExpense()" title="记一笔">＋</button>
      <button class="btn-icon" onclick="openStats()" title="统计">📊</button>
      <button class="btn-icon" onclick="openCSVImport()" title="导入">📄</button>
    </div>
    <div class="summary-row" id="exp-summary"></div>
    <div id="expense-list"></div>
  </div>
</section>

<!-- 打卡 -->
<section id="page-habits" class="page">
  <div class="page-content">
    <div id="habit-grid" class="habit-grid"></div>
  </div>
</section>

<!-- 设置 -->
<section id="page-settings" class="page">
  <div class="page-content">
    <div class="card">
      <div class="card-title">数据概览</div>
      <div class="setting-row"><span>记账条目</span><span class="secondary" id="set-expense-count">0</span></div>
      <div class="setting-row"><span>习惯项目</span><span class="secondary" id="set-habit-count">0</span></div>
      <div class="setting-row"><span>打卡总天数</span><span class="secondary" id="set-checkin-count">0</span></div>
    </div>
    <div class="card">
      <div class="card-title">数据管理</div>
      <button class="btn-block" onclick="exportData()">📤 导出数据</button>
      <button class="btn-block btn-danger" onclick="clearAllData()">🗑️ 清除所有数据</button>
    </div>
    <div class="card">
      <div class="card-title">使用说明</div>
      <div class="help-item"><strong>① 快速记账</strong><br>在首页点击常用分类快速记录一笔</div>
      <div class="help-item"><strong>② 导入账单</strong><br>支付宝/微信导出 CSV → 在记账页导入</div>
      <div class="help-item"><strong>③ 习惯打卡</strong><br>添加习惯后，每天点一下打卡</div>
    </div>
    <div class="card">
      <div class="setting-row"><span>版本</span><span class="secondary">1.0.0</span></div>
      <div style="text-align:center;color:var(--secondary);font-size:13px;padding:8px 0">rayjfoo · 个人记账打卡</div>
    </div>
  </div>
</section>
</main>

<!-- ====== 底部标签栏 ====== -->
<nav id="tabbar">
  <button class="tab-btn active" data-tab="dashboard">
    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M2 12.5L12 3l10 9.5V20a1 1 0 01-1 1H3a1 1 0 01-1-1v-7.5z" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M9 21v-8h6v8" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
    <span>总览</span>
  </button>
  <button class="tab-btn" data-tab="expenses">
    <svg viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M12 6v12M6 12h12" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
    <span>记账</span>
  </button>
  <button class="tab-btn" data-tab="habits">
    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M9 12l2 2 4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
    <span>打卡</span>
  </button>
  <button class="tab-btn" data-tab="settings">
    <svg viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
    <span>设置</span>
  </button>
</nav>

<!-- ====== 模态框：记一笔 ====== -->
<div id="modal-add-expense" class="modal-overlay" onclick="closeModal(this)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <button onclick="closeModal(this)">取消</button>
      <span class="modal-title">记一笔</span>
      <button onclick="saveExpense()" id="btn-save-expense">保存</button>
    </div>
    <div class="modal-body">
      <div class="amount-input-row">
        <span class="currency-symbol">¥</span>
        <input type="number" id="exp-amount" class="amount-input" placeholder="0.00" step="0.01" inputmode="decimal">
      </div>
      <div class="toggle-row">
        <button class="toggle-btn active" data-value="true" onclick="toggleExpenseType(this)">支出</button>
        <button class="toggle-btn" data-value="false" onclick="toggleExpenseType(this)">收入</button>
      </div>
      <div class="form-section">
        <div class="form-label">分类</div>
        <div class="category-grid" id="exp-category-grid"></div>
      </div>
      <div class="form-section">
        <div class="form-label">备注</div>
        <input type="text" id="exp-note" class="form-input" placeholder="选填" maxlength="50">
      </div>
      <div class="form-section">
        <div class="form-label">日期</div>
        <input type="date" id="exp-date" class="form-input">
      </div>
    </div>
  </div>
</div>

<!-- 模态框：统计 -->
<div id="modal-stats" class="modal-overlay" onclick="closeModal(this)">
  <div class="modal-content modal-full" onclick="event.stopPropagation()">
    <div class="modal-header">
      <button onclick="closeModal(this)">完成</button>
      <span class="modal-title">统计</span>
      <span></span>
    </div>
    <div class="modal-body">
      <div class="year-nav">
        <button onclick="statsYear(-1)">‹</button>
        <span id="stats-year-label"></span>
        <button onclick="statsYear(1)">›</button>
      </div>
      <div class="card">
        <div class="card-title">月度支出趋势</div>
        <div id="stats-chart" class="bar-chart"></div>
      </div>
      <div class="card">
        <div class="card-title">支出分类排行</div>
        <div id="stats-category"></div>
      </div>
    </div>
  </div>
</div>

<!-- 模态框：CSV导入 -->
<div id="modal-csv" class="modal-overlay" onclick="closeModal(this)">
  <div class="modal-content modal-full" onclick="event.stopPropagation()">
    <div class="modal-header">
      <button onclick="closeModal(this)">取消</button>
      <span class="modal-title">导入账单</span>
      <span></span>
    </div>
    <div class="modal-body">
      <!-- 文件上传 -->
      <div class="csv-upload-area" style="text-align:center;padding:8px 0">
        <input type="file" id="csv-file" accept=".csv,.txt" style="display:none">
        <button class="btn-block btn-primary" onclick="document.getElementById('csv-file').click()">📁 选择 CSV 文件</button>
        <div style="font-size:12px;color:var(--secondary);margin:4px 0" id="csv-file-name">未选择文件</div>
      </div>

      <div style="display:flex;align-items:center;gap:8px;margin:4px 0">
        <div style="flex:1;height:1px;background:var(--separator)"></div>
        <span style="font-size:12px;color:var(--secondary);white-space:nowrap">或手动粘贴</span>
        <div style="flex:1;height:1px;background:var(--separator)"></div>
      </div>

      <div class="toggle-row" id="csv-encoding-toggle">
        <button class="toggle-btn active" data-enc="utf8" onclick="selectEncoding(this,'utf8')">UTF-8</button>
        <button class="toggle-btn" data-enc="gbk" onclick="selectEncoding(this,'gbk')">GBK (中文)</button>
      </div>

      <textarea id="csv-text" class="csv-textarea" placeholder="CSV 内容会显示在这里..." rows="6"></textarea>

      <div style="font-size:12px;color:var(--secondary);margin:4px 0">
        如果内容乱码，切换上方编码后重新选择文件
      </div>

      <div class="toggle-row" id="csv-source-toggle">
        <button class="toggle-btn active" onclick="selectCSVSource(this,'auto')">自动检测</button>
        <button class="toggle-btn" onclick="selectCSVSource(this,'alipay')">支付宝</button>
        <button class="toggle-btn" onclick="selectCSVSource(this,'wechat')">微信</button>
      </div>

      <button class="btn-block btn-primary" onclick="importCSV()">导入</button>
      <div id="csv-result"></div>
    </div>
  </div>
</div>

<!-- 模态框：新增习惯 -->
<div id="modal-add-habit" class="modal-overlay" onclick="closeModal(this)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <button onclick="closeModal(this)">取消</button>
      <span class="modal-title">新建习惯</span>
      <button onclick="saveHabit()" id="btn-save-habit">保存</button>
    </div>
    <div class="modal-body">
      <div class="form-section">
        <div class="form-label">名称</div>
        <input type="text" id="habit-name" class="form-input" placeholder="如：早起跑步" maxlength="20">
      </div>
      <div class="form-section">
        <div class="form-label">图标</div>
        <div class="emoji-grid" id="emoji-grid"></div>
      </div>
    </div>
  </div>
</div>

<!-- 模态框：习惯详情 -->
<div id="modal-habit-detail" class="modal-overlay" onclick="closeModal(this)">
  <div class="modal-content modal-full" onclick="event.stopPropagation()">
    <div class="modal-header">
      <button onclick="closeModal(this)">完成</button>
      <span class="modal-title" id="habit-detail-title">习惯详情</span>
      <button class="btn-danger-text" onclick="deleteCurrentHabit()">删除</button>
    </div>
    <div class="modal-body" id="habit-detail-body"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
